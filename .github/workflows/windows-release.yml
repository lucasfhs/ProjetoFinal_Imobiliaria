name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows x64 installer
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          architecture: x64
          cache: maven

      - name: Validate release tag
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+(\.\d+){0,2}$') {
            throw "Use uma tag no formato v1.0.0. Tag recebida: ${{ github.ref_name }}"
          }

      - name: Build application
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = if ("${{ github.event_name }}" -eq "push") {
            "${{ github.ref_name }}".TrimStart("v")
          } else {
            "1.0.0"
          }
          $modulePath = "target\jota-properties.jar;target\dependency"
          New-Item -ItemType Directory -Path release -Force | Out-Null

          jpackage `
            --type exe `
            --dest release `
            --name "Jota Imoveis" `
            --app-version $version `
            --description "Aplicação desktop da Jota Imóveis" `
            --vendor "Jota Imóveis" `
            --module-path $modulePath `
            --module "com.jotaproperties/com.jotaproperties.app.RealEstateApplication" `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group "Jota Imoveis" `
            --win-shortcut

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: jota-properties-windows-x64
          path: release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          if ($null -eq $installer) {
            throw "O instalador .exe não foi gerado."
          }
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${{ github.ref_name }}" "$($installer.FullName)" --clobber
          } else {
            gh release create "${{ github.ref_name }}" "$($installer.FullName)" `
              --title "Jota Imóveis ${{ github.ref_name }}" `
              --generate-notes
          }
